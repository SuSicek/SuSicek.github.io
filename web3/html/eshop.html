<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-shop | UCHYTIL s.r.o.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/web3/css/style.css">
  <link rel="stylesheet" href="/web3/css/eshop-style.css">
  <link rel="icon" href="/web3/fotky/logo.png" type="image/png">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script src="/web3/js/content-loader.js"></script>
  <script src="/web3/js/eshop-script.js"></script>
</head>
<body>
  <!-- Header -->
  <div id="eshop-sticky-header">
    <a href="/web3/html/index.html" class="eshop-logo">
      <img id="mainLogo" src="/web3/fotky/logo.png" alt="UCHYTIL s.r.o. Logo">
    </a>
  </div>
  
  <button id="scrollTopBtn" aria-label="Zpět nahoru">
    <ion-icon name="arrow-up-outline"></ion-icon>
  </button>

  <!-- Hero Section -->
  <section class="eshop-hero">
    <div class="hero-container">
      <div class="hero-content">
        <h1 id="hero-title">E-SHOP UCHYTIL</h1>
        <p id="hero-subtitle"><!-- Dynamic content --></p>
        <div class="hero-features" id="hero-features">
          <!-- Dynamic features -->
        </div>
      </div>
      <div class="hero-visual">
        <div class="hero-image">
          <img id="hero-image" src="" alt="">
        </div>
      </div>
    </div>
  </section>

  <!-- Categories Section -->
  <section class="section">
    <div class="container">
      <div class="section-title">
        <h2>
          <ion-icon name="grid-outline"></ion-icon>
          Kategorie produktů
        </h2>
        <p class="section-subtitle">Prozkoumejte naši širokou nabídku produktů rozdělených do specializovaných kategorií</p>
      </div>
      <div class="categories-grid" id="categoriesGrid">
        <!-- Dynamic categories -->
      </div>
    </div>
  </section>

  <!-- Search & Filter Section -->
  <section class="search-filter-section">
    <div class="search-filter-container">
      <div class="search-filter-bar">
        <div class="search-box">
          <ion-icon name="search-outline"></ion-icon>
          <input type="text" id="searchInput" placeholder="Hledat produkty v e-shopu...">
        </div>
        <div class="filter-controls">
          <select id="categoryFilter">
            <option value="">Všechny kategorie</option>
            <!-- Dynamic categories -->
          </select>
          <select id="sortFilter">
            <option value="name">Název A-Z</option>
            <option value="name-desc">Název Z-A</option>
            <option value="availability">Dostupnost</option>
            <option value="price">Cena vzestupně</option>
            <option value="price-desc">Cena sestupně</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <!-- Products Section -->
  <section class="section section-alt">
    <div class="container">
      <div class="section-title">
        <h2>
          <ion-icon name="cube-outline"></ion-icon>
          E-shop produkty
        </h2>
        <p class="section-subtitle">Kvalitní produkty pro vaše projekty s možností rezervace a vyzvednutí v prodejně</p>
      </div>
      <div class="products-grid" id="productsGrid">
        <!-- Dynamic products -->
      </div>
      <div class="load-more-container">
        <button id="loadMoreBtn" class="btn btn-primary">
          <ion-icon name="add-outline"></ion-icon>
          Načíst více produktů
        </button>
      </div>
    </div>
  </section>

  <!-- Dynamic sections will be added here -->

  <!-- Contact CTA Section -->
  <section class="eshop-cta section">
    <div class="container">
      <div class="cta-content">
        <h2 id="cta-title"><!-- Dynamic content --></h2>
        <p id="cta-text"><!-- Dynamic content --></p>
        <div class="cta-buttons">
          <a href="/web3/html/contact-us.html" class="btn btn-primary">
            <ion-icon name="call-outline"></ion-icon>
            Kontaktujte nás
          </a>
          <a href="tel:545423211" class="btn btn-secondary">
            <ion-icon name="chatbubble-outline"></ion-icon>
            Zavolejte
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-top">
      <div class="container">
        <div class="footer-brand">
          <a href="#" class="logo"><img id="footer-logo" src="" alt="UCHYTIL s.r.o."></a>
          <p class="footer-text" id="footer-text"><!-- Dynamic content --></p>
        </div>
        <div class="footer-contact">
          <h4 class="contact-title" id="footer-contact-title"><!-- Dynamic content --></h4>
          <ul id="footer-contact-list">
            <!-- Dynamic contact info -->
          </ul>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <div class="container">
        <p class="footer-copyright" id="footer-copyright"><!-- Dynamic content --></p>
      </div>
    </div>
  </footer>
</body>
</html>
