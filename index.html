<style>
/* ...existing code... */
.navbar-dropdown {
  position: relative;
}
.navbar-dropdown-toggle {
  background: none;
  border: none;
  color: inherit;
  font: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 18px 0 0;
}
.navbar-dropdown-menu {
  display: none;
  position: absolute;
  left: 0;
  top: 100%;
  min-width: 180px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(30,41,59,0.13);
  padding: 8px 0;
  z-index: 100;
  margin-top: 6px;
}
.navbar-dropdown-menu .navbar-dropdown-link {
  display: block;
  padding: 10px 22px;
  color: #2256A1;
  text-decoration: none;
  font-weight: 600;
  transition: background 0.15s, color 0.15s;
}
.navbar-dropdown-menu .navbar-dropdown-link:hover {
  background: #f1f5fa;
  color: #059669;
}
.navbar-dropdown.open > .navbar-dropdown-menu {
  display: block;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('servicesDropdownBtn');
  var menu = document.getElementById('servicesDropdownMenu');
  var parent = btn?.closest('.navbar-dropdown');
  if (btn && menu && parent) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      var isOpen = parent.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      if (!parent.contains(e.target)) {
        parent.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  }
});
</script>
